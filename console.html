<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAAYA Console — Leader Management System</title>
<meta name="description" content="RAAYA Leader Console: onboard political leaders, plan campaigns, track execution and budgets.">
<link rel="stylesheet" href="assets/style.css">
<style>
/* ===== Console-specific styles (extends brand system) ===== */
.con-hero{background:radial-gradient(900px 480px at 85% -20%,#1b3a63,var(--navy) 60%);color:#fff;padding:130px 0 46px;}
.con-hero h1{font-size:40px;margin:10px 0 8px;}
.con-hero p{color:var(--ice);font-size:19.5px;max-width:70ch;}
.con-body{padding:44px 0 90px;background:var(--mist);min-height:60vh;}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:30px;margin-bottom:22px;box-shadow:0 2px 10px rgba(11,31,58,.05);}
.card h2{font-size:24px;margin-bottom:6px;}
.card .sub{color:var(--muted);font-size:19.5px;margin-bottom:20px;}
/* wizard progress */
.wsteps{display:flex;gap:8px;margin:18px 0 26px;flex-wrap:wrap;}
.wstep{flex:1;min-width:120px;text-align:center;padding:10px 6px;border-radius:8px;background:#fff;border:1px solid var(--line);font-size:19.5px;font-weight:700;color:var(--muted);}
.wstep.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.wstep.done{background:var(--gold);color:var(--navy);border-color:var(--gold);}
/* forms */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px 20px;}
.fgrid .full{grid-column:1/-1;}
@media(max-width:700px){.fgrid{grid-template-columns:1fr;}}
label{display:block;font-size:18.5px;font-weight:700;color:var(--navy);margin-bottom:5px;letter-spacing:.3px;}
input,select,textarea{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:8px;font-size:19.5px;font-family:inherit;background:#fff;color:var(--ink);}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);}
.hint{font-size:19px;color:var(--muted);margin-top:4px;}
/* option tiles */
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
.tile{border:1.5px solid var(--line);border-radius:10px;padding:14px 16px;cursor:pointer;background:#fff;transition:.15s;}
.tile:hover{border-color:var(--gold);}
.tile.sel{border-color:var(--gold);background:#FDF6E9;box-shadow:0 0 0 1px var(--gold);}
.tile h4{font-size:19.5px;color:var(--navy);}
.tile p{font-size:19px;color:var(--muted);line-height:1.45;margin-top:3px;}
.wnav{display:flex;justify-content:space-between;margin-top:26px;gap:12px;}
.err{color:#B3261E;font-size:18.5px;font-weight:700;margin-top:12px;display:none;}
/* leader list */
.lrow{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.lrow:last-child{border-bottom:none;}
.lrow .nm{font-weight:700;color:var(--navy);font-size:19.5px;}
.lrow .meta{font-size:18.5px;color:var(--muted);}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:18px;font-weight:700;background:var(--navy);color:#fff;margin-left:8px;}
.badge.g{background:var(--gold);color:var(--navy);}
.btn-sm{padding:9px 16px;font-size:18.5px;border-radius:7px;}
.summ dt{font-weight:700;color:var(--navy);font-size:18.5px;margin-top:12px;}
.summ dd{font-size:19.5px;color:var(--ink);}
/* plan timeline */
.count{display:flex;gap:12px;flex-wrap:wrap;margin:6px 0 20px;}
.count .cbox{background:var(--navy);color:#fff;border-radius:10px;padding:14px 20px;text-align:center;min-width:110px;}
.count .cbox .n{font-family:Georgia,serif;font-size:30px;color:var(--gold);font-weight:700;line-height:1.1;}
.count .cbox .l{font-size:18.5px;color:var(--ice);letter-spacing:.5px;}
.phase{border-left:4px solid var(--gold);background:#fff;border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:10px;padding:18px 20px;margin-bottom:14px;}
.phase.past{opacity:.55;border-left-color:var(--muted);}
.phase.now{box-shadow:0 0 0 2px var(--gold);}
.phase .ph-top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:baseline;}
.phase h3{font-size:19.5px;color:var(--navy);}
.phase .dates{font-size:19.5px;font-weight:700;color:var(--gold);letter-spacing:.5px;}
.phase ul{margin:10px 0 0 18px;font-size:19px;line-height:1.65;}
.phase ul li{margin-bottom:3px;}
.phase .svctag{display:inline-block;font-size:17.5px;font-weight:700;background:var(--mist);color:var(--navy);border:1px solid var(--line);border-radius:4px;padding:1px 7px;margin-right:6px;vertical-align:middle;}
.tlbar{display:flex;height:14px;border-radius:8px;overflow:hidden;margin:4px 0 24px;border:1px solid var(--line);}
.tlbar div{position:relative;}
.tlnote{font-size:19px;color:var(--muted);margin-bottom:18px;}
/* execution tracker */
.prog{height:12px;background:var(--mist);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin:8px 0 20px;}
.prog div{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:.3s;}
.trow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.trow:last-child{border-bottom:none;}
.trow.done .tt{text-decoration:line-through;color:var(--muted);}
.tt{flex:1;min-width:200px;font-size:19.5px;color:var(--ink);}
.tmeta{font-size:19px;color:var(--muted);white-space:nowrap;}
.tmeta.late{color:#B3261E;font-weight:700;}
.st{border:none;border-radius:20px;padding:5px 14px;font-size:18.5px;font-weight:700;cursor:pointer;min-width:106px;font-family:inherit;}
.st.pending{background:var(--mist);color:var(--muted);border:1px solid var(--line);}
.st.progress{background:var(--navy);color:#fff;}
.st.done{background:var(--gold);color:var(--navy);}
.tdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:19.5px;}
.tdel:hover{color:#B3261E;}
.taddgrid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:10px;margin-top:18px;align-items:end;}
@media(max-width:820px){.taddgrid{grid-template-columns:1fr 1fr;}}
/* budget */
.btotals{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
.btotals .cbox{background:var(--mist);border:1px solid var(--line);border-radius:10px;padding:12px 18px;min-width:150px;}
.btotals .cbox .n{font-family:Georgia,serif;font-size:24px;font-weight:700;color:var(--navy);}
.btotals .cbox.hot .n{color:#B3261E;}
.btotals .cbox .l{font-size:18.5px;color:var(--muted);letter-spacing:.5px;font-weight:700;}
table.btab{width:100%;border-collapse:collapse;font-size:19px;}
.btab th{text-align:left;font-size:18.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:8px 10px;border-bottom:2px solid var(--line);}
.btab td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle;}
.btab td.num,.btab th.num{text-align:right;font-variant-numeric:tabular-nums;}
.btab td.over{color:#B3261E;font-weight:700;}
.btab input.cell{padding:7px 9px;font-size:18.5px;max-width:130px;text-align:right;}
/* booths */
.lean{border:none;border-radius:20px;padding:5px 14px;font-size:15px;font-weight:700;cursor:pointer;min-width:96px;font-family:inherit;}
.lean.strong{background:#1E7A3C;color:#fff;}
.lean.swing{background:var(--gold);color:var(--navy);}
.lean.weak{background:#B3261E;color:#fff;}
.boothbar{display:flex;height:16px;border-radius:8px;overflow:hidden;border:1px solid var(--line);margin:6px 0 18px;}
.binp{padding:7px 9px;font-size:16px;}
/* print report */
@media print{
  header,.con-hero,.btn,.tdel,.taddgrid,input#impfile{display:none!important;}
  .st{border:1px solid #999;background:none!important;color:#000!important;min-width:auto;}
  .con-body{padding:0;background:#fff;}
  .card{box-shadow:none;border:1px solid #bbb;page-break-inside:avoid;margin-bottom:14px;padding:18px;}
  .phase{page-break-inside:avoid;}
  .prheader{display:block!important;}
}
.prheader{display:none;border-bottom:3px solid var(--gold);padding-bottom:10px;margin-bottom:18px;}
.prheader .b{font-family:Georgia,serif;font-size:26px;letter-spacing:4px;color:var(--navy);font-weight:700;}
.prheader .t{font-size:15px;color:var(--muted);}
</style>
</head>
<body>

<header id="hdr"><div class="wrap"><nav>
  <a href="index.html" class="brand">RAAYA<small>POLITICAL STRATEGY</small></a>
  <div class="navlinks" id="nav">
    <a class="link" href="index.html">Home</a>
    <a class="link" href="services.html">Services</a>
    <a class="link" href="approach.html">Approach</a>
    <a class="link" href="about.html">About</a>
    <a class="link active" href="console.html">Console</a>
    <a class="link" href="contact.html" data-i18n="nav_contact">Contact</a>
    <div class="langsw"></div>
  </div>
  <button class="menu-btn" onclick="document.getElementById('nav').classList.toggle('open')">☰</button>
</nav></div></header>

<section class="con-hero"><div class="wrap">
  <span class="kicker">RAAYA CONSOLE</span>
  <h1>Leader Management System</h1>
  <p>Onboard a leader, define the electoral target, choose RAAYA services — and get a plan, timeline, execution tracker and budget. All data stays in this browser.</p>
</div></section>

<div class="con-body"><div class="wrap" id="app"></div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
<script src="assets/i18n.js"></script>
<script src="assets/console-i18n.js"></script>
<script src="assets/ka2023.js"></script>
<script src="assets/ka_ls2024.js"></script>
<script src="assets/ka_mlc.js"></script>
<script src="assets/ka_dossier.js"></script>
<script src="assets/gba2026.js"></script>
<script src="assets/ka_demo.js"></script>
<script src="assets/gba_voters.js"></script>
<script>
/* =============== RAAYA Leader Console — Step 1: Onboarding =============== */
const DB_KEY = 'raaya_leaders_v1';
const localdb = {
  all(){ try{ return JSON.parse(localStorage.getItem(DB_KEY))||[] }catch(e){ return [] } },
  save(list){ localStorage.setItem(DB_KEY, JSON.stringify(list)); },
  upsert(rec){ const list=this.all(); const i=list.findIndex(l=>l.id===rec.id); if(i>=0)list[i]=rec; else list.push(rec); this.save(list); },
  remove(id){ this.save(this.all().filter(l=>l.id!==id)); }
};
/* CLOUD (Firestore) is used when firebase-config.js has real keys and the user is signed in.
   Reads are served synchronously from an onSnapshot-fed cache so all render code stays unchanged. */
let CLOUD = null; // {col, cache:[], user}
const db = {
  all(){ return CLOUD ? CLOUD.cache.slice() : localdb.all(); },
  get(id){ return this.all().find(l=>l.id===id); },
  upsert(rec){
    if(CLOUD){ if(!rec.access||!rec.access.length) rec.access=[CLOUD.user.email]; /* creator always has access */
      const i=CLOUD.cache.findIndex(l=>l.id===rec.id); i>=0?CLOUD.cache[i]=rec:CLOUD.cache.push(rec);
      CLOUD.col.doc(rec.id).set(JSON.parse(JSON.stringify(rec))).catch(e=>alert('Cloud save failed: '+e.message)); }
    else localdb.upsert(rec);
  },
  remove(id){
    if(CLOUD){ CLOUD.cache=CLOUD.cache.filter(l=>l.id!==id);
      CLOUD.col.doc(id).delete().catch(e=>alert('Cloud delete failed: '+e.message)); }
    else localdb.remove(id);
  },
  save(list){ // bulk (used by import backup)
    if(CLOUD){ CLOUD.cache=list.slice(); list.forEach(r=>CLOUD.col.doc(r.id).set(JSON.parse(JSON.stringify(r)))); }
    else localdb.save(list);
  }
};
function cloudConfigured(){ const c=window.FIREBASE_CONFIG; return c && !/PASTE_/.test(c.apiKey) && !/PASTE_/.test(c.projectId); }

const ELECTIONS = [
  ['lok_sabha','Lok Sabha (MP)','National general election — parliamentary constituency'],
  ['vidhan_sabha','Vidhan Sabha (MLA)','State assembly election'],
  ['mlc','MLC / Council','Legislative council — graduates, teachers, local bodies'],
  ['zilla','Zilla / Taluk Panchayat','District & taluk level rural bodies'],
  ['municipal','Municipal / Corporation','Urban local body — corporator, mayor track'],
  ['gram','Gram Panchayat','Village-level election'],
  ['coop','Co-operative / Society','APMC, co-op banks, societies'],
  ['party','Party Position','Internal party post — district president, state office']
];
const SERVICES = [
  ['gp','Ground Pulse','Voter intelligence, booth-level surveys, caste/community mapping'],
  ['cb','Candidate Blueprint','Personal brand, positioning, image & narrative building'],
  ['cc','Campaign Command','End-to-end campaign management & field organisation'],
  ['dm','Digital Mandate','Social media, WhatsApp networks, digital influence'],
  ['wr','War Room','24×7 monitoring, rapid response, opposition tracking'],
  ['gc','Governance Connect','Constituency service, grievance handling, delivery tracking'],
  ['as','Astro-Strategy Advisory','Muhurta calendar, timing of announcements & filings'],
  ['mr','Media Relations','Press strategy, interviews, local media management']
];
const STATES = ['Karnataka','Andhra Pradesh','Telangana','Tamil Nadu','Kerala','Maharashtra','Goa','Other'];

let W = { step:0, data:{} };   // wizard state
const $ = s=>document.querySelector(s);
const esc = s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---------- Home: leader list ---------- */
function leaderStats(l){
  const today=new Date(); today.setHours(0,0,0,0);
  const e=l.electionDate?new Date(l.electionDate):null;
  const days=(e&&!isNaN(e))?Math.ceil((e-today)/864e5):null;
  const tasks=l.tasks||[], done=tasks.filter(t=>t.status==='done').length;
  const late=tasks.filter(t=>t.due&&t.due<today.toISOString().slice(0,10)&&t.status!=='done').length;
  const planned=(l.budget||[]).reduce((s,b)=>s+(+b.planned||0),0);
  const actual=(l.budget||[]).reduce((s,b)=>s+(+b.actual||0),0);
  return {days,tasks:tasks.length,done,late,planned,actual};
}
function renderHome(){
  window.__rerender = renderHome;
  const leaders = db.all();
  const agg = leaders.map(leaderStats);
  const dash = leaders.length?`<div class="count">
    <div class="cbox"><div class="n">${leaders.length}</div><div class="l">LEADERS</div></div>
    <div class="cbox"><div class="n">${agg.reduce((s,a)=>s+a.tasks-a.done,0)}</div><div class="l">OPEN TASKS</div></div>
    <div class="cbox"><div class="n" ${agg.some(a=>a.late)?'style="color:#ff8f8f"':''}>${agg.reduce((s,a)=>s+a.late,0)}</div><div class="l">OVERDUE</div></div>
    <div class="cbox"><div class="n">${inr(agg.reduce((s,a)=>s+a.actual,0))}</div><div class="l">TOTAL SPENT</div></div>
  </div>`:'';
  let rows = leaders.length ? leaders.map((l,i)=>{
    const a=agg[i];
    const pct=a.tasks?Math.round(a.done/a.tasks*100):0;
    return `
    <div class="lrow">
      <div style="flex:1;min-width:240px">
        <div class="nm">${esc(l.name)} <span class="badge g">${esc(elLabel(l.electionType))}</span>
          ${l.party?`<span class="badge">${esc(l.party)}</span>`:''}</div>
        <div class="meta">${esc(l.constituency)}, ${esc(l.state)}
          · ${a.days!==null?(a.days>=0?a.days+' days to poll':'polled'):'date TBD'}
          · Tasks ${a.done}/${a.tasks}${a.late?` <b style="color:#B3261E">(${a.late} overdue)</b>`:''}
          · Spent ${inr(a.actual)}${a.planned?' of '+inr(a.planned):''}</div>
        ${a.tasks?`<div class="prog" style="max-width:340px;margin:8px 0 0"><div style="width:${pct}%"></div></div>`:''}
      </div>
      <div>
        <button class="btn btn-navy btn-sm" onclick="viewLeader('${l.id}')">Open Profile</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--navy);border-color:var(--line)" onclick="delLeader('${l.id}')">Remove</button>
      </div>
    </div>`;}).join('')
    : `<p style="color:var(--muted)">No leaders onboarded yet. Start with your first onboarding below.</p>`;
  $('#app').innerHTML = `
    ${dash?`<div class="card"><h2>Command Dashboard</h2><div class="sub">All campaigns at a glance.</div>${dash}</div>`:''}
    <div class="card">
      <h2>Onboarded Leaders</h2>
      <div class="sub">Every leader gets a profile, plan, tracker and budget.</div>
      ${CLOUD?`<div class="tlnote">☁ Cloud sync ON — signed in as ${esc(CLOUD.user.email)} <span class="badge ${CLOUD.isAdmin?'g':''}">${CLOUD.isAdmin?'ADMIN — all leaders':'STAFF — assigned leaders only'}</span>
        <button class="btn btn-ghost btn-sm" style="color:var(--navy);border-color:var(--line);margin-left:8px" onclick="doLogout()">Sign out</button></div>`
      :cloudConfigured()?'':`<div class="tlnote">💾 Local mode — data lives only in this browser. Paste your Firebase keys in assets/firebase-config.js to enable team cloud sync.</div>`}
      ${rows}
      <div style="margin-top:22px"><button class="btn btn-gold" onclick="startWizard()">+ Onboard New Leader</button>
      <button class="btn btn-navy" style="margin-left:10px" onclick="renderDirectory()">📇 Leader Directory — 252 seats</button>
      ${leaders.length?`<button class="btn btn-navy btn-sm" style="margin-left:10px" onclick="exportData()">⤒ Export backup (JSON)</button>
      <button class="btn btn-ghost btn-sm" style="color:var(--navy);border-color:var(--line)" onclick="document.getElementById('impfile').click()">⤓ Import backup</button>
      <input type="file" id="impfile" accept=".json" style="display:none" onchange="importData(this)">`:''}</div>
    </div>`;
}
function exportData(){
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(db.all(),null,1));
  a.download='raaya-console-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importData(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!Array.isArray(d)) throw 0;
    if(confirm('Replace current data with '+d.length+' leader(s) from backup?')){ db.save(d); renderHome(); }
  }catch(e){ alert('Invalid backup file.'); } };
  r.readAsText(f);
}
function elLabel(k){ const e=ELECTIONS.find(e=>e[0]===k); return e?e[1]:k; }
function delLeader(id){ if(confirm('Remove this leader and all their data?')){ db.remove(id); renderHome(); } }

/* ---------- Wizard ---------- */
const STEP_NAMES = ['Leader Profile','Election Target','Constituency','RAAYA Services','Review & Confirm'];
function startWizard(){ W={step:0,data:{services:[]}}; renderWizard(); }
function progress(){
  return `<div class="wsteps">`+STEP_NAMES.map((n,i)=>
    `<div class="wstep ${i<W.step?'done':i===W.step?'on':''}">${i+1}. ${n}</div>`).join('')+`</div>`;
}
function wnav(back=true,label='Continue'){
  return `<div class="err" id="werr"></div><div class="wnav">
    ${back?`<button class="btn btn-ghost btn-sm" style="color:var(--navy);border-color:var(--muted)" onclick="wBack()">← Back</button>`:`<button class="btn btn-ghost btn-sm" style="color:var(--navy);border-color:var(--muted)" onclick="renderHome()">Cancel</button>`}
    <button class="btn btn-gold" onclick="wNext()">${label}</button></div>`;
}
function fail(msg){ const e=$('#werr'); e.textContent=msg; e.style.display='block'; }

function renderWizard(){
  window.__rerender = ()=>{ try{collect();}catch(e){} renderWizard(); };
  const d=W.data;
  const bodies=[
`<div class="card"><h2>Leader Profile</h2><div class="sub">Who are we onboarding?</div>
 <div class="fgrid">
  <div><label>Full Name *</label><input id="f_name" value="${esc(d.name)}"></div>
  <div><label>Party / Affiliation</label><input id="f_party" value="${esc(d.party)}" placeholder="e.g. INC, BJP, JD(S), Independent"></div>
  <div><label>Phone</label><input id="f_phone" value="${esc(d.phone)}"></div>
  <div><label>Email</label><input id="f_email" value="${esc(d.email)}"></div>
  <div><label>Current Position</label><input id="f_pos" value="${esc(d.position)}" placeholder="e.g. Sitting MLA, Youth leader, First-time aspirant"></div>
  <div><label>Political Experience (years)</label><input id="f_exp" type="number" min="0" value="${esc(d.experience)}"></div>
  <div class="full"><label>Key Strengths / Notes</label><textarea id="f_notes" rows="2" placeholder="Community influence, existing network, public image...">${esc(d.notes)}</textarea></div>
 </div>${wnav(false)}</div>`,

`<div class="card"><h2>Election Target</h2><div class="sub">Which election is the leader targeting?</div>
 <div class="tiles" id="eltiles">${ELECTIONS.map(e=>
   `<div class="tile ${d.electionType===e[0]?'sel':''}" onclick="pickEl('${e[0]}')"><h4>${e[1]}</h4><p>${e[2]}</p></div>`).join('')}</div>
 <div class="fgrid" style="margin-top:20px">
  <div><label>Expected Election Date</label><input id="f_edate" type="date" value="${esc(d.electionDate)}"><div class="hint">Approximate is fine — drives the timeline in Step 2 of the build.</div></div>
  <div><label>Contest Status</label><select id="f_status">
    ${['Ticket confirmed','Seeking ticket','Exploring / undecided','Incumbent defending seat'].map(o=>`<option ${d.status===o?'selected':''}>${o}</option>`).join('')}
  </select></div>
 </div>${wnav()}</div>`,

`<div class="card"><h2>Constituency</h2><div class="sub">Where is the battle?</div>
 ${kaData(d.electionType)?`<div style="margin-bottom:18px">
   <label>Pick a Karnataka ${d.electionType==='lok_sabha'?'Lok Sabha Constituency (2024 results auto-fill)':'Assembly Constituency (2023 results auto-fill)'}</label>

function pickKA(name){
  const d=W.data; const k=(kaData(d.electionType)||[]).find(x=>x.c===name);

function collect(){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():undefined};
  const d=W.data;
  if(W.step===0){d.name=g('f_name');d.party=g('f_party');d.phone=g('f_phone');d.email=g('f_email');d.position=g('f_pos');d.experience=g('f_exp');d.notes=g('f_notes');}
  if(W.step===1){d.electionDate=g('f_edate');d.status=g('f_status');}
  if(W.step===2){d.state=g('f_state');d.constituency=g('f_const');d.voters=g('f_voters');d.mix=g('f_mix');d.rivals=g('f_rivals');
    if(d.intel && d.constituency!==d.intel.c) d.intel=null; /* typed over the picked seat */}
  if(W.step===3){d.budgetBand=g('f_budget');d.start=g('f_start');}
}
function wNext(){
  collect(); const d=W.data;
  if(W.step===0 && !d.name) return fail('Leader name is required.');
  if(W.step===1 && !d.electionType) return fail('Select the election the leader is targeting.');
  if(W.step===2 && !d.constituency) return fail('Constituency name is required.');
  if(W.step===3 && d.services.length===0) return fail('Select at least one RAAYA service.');
  if(W.step===4){
    d.id = d.id || 'L'+Date.now();
    d.createdAt = d.createdAt || new Date().toISOString();
    d.tasks = d.tasks||[]; d.budget = d.budget||[];   // used by later build steps
    db.upsert(d); viewLeader(d.id); return;
  }
  W.step++; renderWizard();
}

/* ---------- Constituency Intelligence (KA 2023) ---------- */
function renderIntel(l){
  const k=l.intel; if(!k) return '';
  const meta=kaMeta(l.electionType);
  const tot=k.wv+k.rv; /* two-way share for the bar */
  const wpct=Math.round(k.wv/tot*100);
  const marginPct=(k.m/k.wv*100).toFixed(1);
  const mp=k.m/k.wv*100;
  const battle = mp<8?'MARGINAL SEAT — highly winnable':mp<20?'COMPETITIVE SEAT':'STRONGHOLD — steep climb for challengers';
  return `<div class="card"><h2>Constituency Intelligence — ${esc(k.c)} <span class="badge ${mp<8?'':'g'}">${battle}</span></h2>
    <div class="sub">${meta.yr} ${meta.house} result (live data, source: ECI via Wikipedia).</div>
    <div class="btotals">
      <div class="cbox"><div class="n">${esc(k.w)}</div><div class="l">SITTING ${meta.seat} — ${esc(k.wp)} · ${k.wv.toLocaleString('en-IN')} VOTES</div></div>
      <div class="cbox"><div class="n">${esc(k.r)}</div><div class="l">RUNNER-UP — ${esc(k.rp)} · ${k.rv.toLocaleString('en-IN')} VOTES</div></div>
      <div class="cbox ${mp<8?'hot':''}"><div class="n">${k.m.toLocaleString('en-IN')}</div><div class="l">${meta.yr} MARGIN (${marginPct}% OF WINNER'S VOTES)</div></div>
    </div>
    <div class="tlbar" title="${esc(k.wp)} ${wpct}% vs ${esc(k.rp)} ${100-wpct}% (head-to-head)">
      <div style="flex:${k.wv};background:var(--navy)"></div><div style="flex:${k.rv};background:var(--gold)"></div>
    </div>
    <div class="tlnote">Head-to-head vote split: <b>${esc(k.wp)}</b> ${wpct}% (navy) vs <b>${esc(k.rp)}</b> ${100-wpct}% (gold). Flip target: ${Math.ceil(k.m/2+1).toLocaleString('en-IN')}+ voters need to switch.</div>
    ${renderDossier(k,l)}
    ${renderDemo(k,l)}
  </div>`;
}

/* Phases as fractions of the runway (0 = engagement start/today, 1 = poll day).
   Each action: [serviceKey|null, text] — null = always included. */

 ['Foundation & Setup', 0, .15, '#13294B', [
   [null,'Sign engagement, set up core campaign team & reporting rhythm'],
   [null,'Constituency baseline: past results, booth list, demographic profile'],

   ['dm','Build WhatsApp network & social handles; start content calendar'],
   [null,'Position on top 3 local issues with concrete promises']]],
 ['Organisation & Ground Game', .4, .75, '#13294B', [
   ['cc','Appoint booth committees & block in-charges; training sessions'],
   ['gp','Survey wave 2 — measure narrative shift, update target booths'],

   [null,'Community & influencer outreach: mathas, associations, youth clubs']]],
 ['Digital Surge & War Room', .6, .9, '#1b3a63', [
   ['wr','War room live: 24×7 monitoring, rumour response within 2 hours'],
   ['dm','Paid + organic digital push; hyperlocal targeting by booth cluster'],
   ['mr','Interview circuit, op-eds, press meets on schedule'],
   [null,'Nomination filing, ECI compliance & expense register discipline']]],
 ['Final Blitz', .88, 1, '#B3261E', [
   [null,'Door-to-door sweep of swing booths; leader roadshows'],
   ['cc','Poll-day machinery: booth agents, slip distribution, transport plan'],
   ['dm','Last-72-hour digital burst (within silence-period rules)'],
   ['wr','Counter-narrative rapid response; protect turnout in strongholds']]],
 ['Poll Day & Counting', 1, 1, '#D99A2B', [
   ['cc','Turnout tracking hour-by-hour; agent check-ins per booth'],
   [null,'Counting-day agents briefed; legal team on standby'],
   ['gc','Post-result: thank-you tour and governance/opposition plan']]]
];
const fmtD = d=>d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});

function renderPlan(l){
  const today = new Date(); today.setHours(0,0,0,0);
  const eday = l.electionDate ? new Date(l.electionDate) : null;
  const hasDate = eday && !isNaN(eday) && eday > today;
  // runway: today → poll day; fallback 12 months if date missing/past
  const end = hasDate ? eday : new Date(today.getTime()+365*864e5);
  const span = end - today;
  const daysLeft = Math.ceil(span/864e5);
  const at = f=>new Date(today.getTime()+span*f);

  const count = `<div class="count">
    <div class="cbox"><div class="n">${hasDate?daysLeft:'—'}</div><div class="l">DAYS TO POLL</div></div>
    <div class="cbox"><div class="n">${hasDate?Math.ceil(daysLeft/7):'—'}</div><div class="l">WEEKS</div></div>
    <div class="cbox"><div class="n">${PHASES.length}</div><div class="l">PHASES</div></div>
    <div class="cbox"><div class="n">${l.services.length}</div><div class="l">SERVICES</div></div>
  </div>`;

  const bar = `<div class="tlbar">${PHASES.slice(0,-1).map(p=>
    `<div style="flex:${Math.max(p[2]-p[1],.05)};background:${p[3]}" title="${p[0]}"></div>`).join('')}</div>`;

  const cards = PHASES.map(p=>{
    const [name,f0,f1,,acts]=p;
    const s=at(f0), e=at(f1);
    const state = today>e?'past':(today>=s?'now':'');
    const items = acts.filter(a=>!a[0]||l.services.includes(a[0]))
      .map(a=>`<li>${a[0]?`<span class="svctag">${SERVICES.find(x=>x[0]===a[0])[1]}</span>`:''}${a[1]}</li>`).join('');
    return `<div class="phase ${state}">
      <div class="ph-top"><h3>${name}${state==='now'?' <span class="badge g">ACTIVE NOW</span>':''}</h3>
      <span class="dates">${f0===1?fmtD(e):fmtD(s)+' → '+fmtD(e)}</span></div>
      <ul>${items}</ul></div>`;
  }).join('');

  return `<div class="card"><h2>Campaign Plan &amp; Timeline</h2>
    <div class="sub">Auto-generated from the ${esc(elLabel(l.electionType))} target for ${esc(l.constituency)} and the ${l.services.length} services selected. Edit the leader's details to regenerate.</div>
    ${hasDate?'':'<div class="tlnote">⚠ No valid future election date set — showing an indicative 12-month runway. Edit details to set the date.</div>'}
    ${count}${bar}${cards}</div>`;
}

/* ---------- Step 3: Execution Tracker ---------- */
const T_STATUS = ['pending','progress','done'];
const T_LABEL  = {pending:'Pending',progress:'In Progress',done:'Done ✓'};

function renderTracker(l){
  const tasks = l.tasks||[];
  const done = tasks.filter(t=>t.status==='done').length;
  const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
  const today = new Date().toISOString().slice(0,10);

  const rows = tasks.length ? tasks.map((t,i)=>{
    const late = t.due && t.due < today && t.status!=='done';
    return `<div class="trow ${t.status==='done'?'done':''}">
      <button class="st ${t.status}" onclick="cycleTask('${l.id}',${i})" title="Click to change status">${T_LABEL[t.status]}</button>
      <span class="tt">${t.phase?`<span class="svctag">${esc(t.phase)}</span>`:''}${esc(t.title)}</span>
      <span class="tmeta">${esc(t.owner||'Unassigned')}</span>
      <span class="tmeta ${late?'late':''}">${t.due?(late?'⚠ ':'')+'Due '+esc(t.due):''}</span>
      <button class="tdel" onclick="delTask('${l.id}',${i})" title="Delete task">✕</button>
    </div>`;
  }).join('') : `<p style="color:var(--muted)">No tasks yet — add one below, or import the campaign plan's actions as tasks in one click.</p>`;

  return `<div class="card"><h2>Execution Tracker</h2>
    <div class="sub">${tasks.length?`${done} of ${tasks.length} tasks done (${pct}%)`:'Track every action: owner, deadline, status.'}</div>
    ${tasks.length?`<div class="prog"><div style="width:${pct}%"></div></div>`:''}
    ${rows}
    <div class="taddgrid">
      <div><label>New Task *</label><input id="t_title" placeholder="e.g. Finalise booth committee list for Block 3"></div>
      <div><label>Owner</label><input id="t_owner" placeholder="Name / team"></div>
      <div><label>Due Date</label><input id="t_due" type="date"></div>
      <div><label>Phase</label><select id="t_phase"><option value="">—</option>${PHASES.map(p=>`<option>${p[0]}</option>`).join('')}</select></div>
      <div><button class="btn btn-navy btn-sm" onclick="addTask('${l.id}')">+ Add</button></div>
    </div>
    <div style="margin-top:14px"><button class="btn btn-gold btn-sm" onclick="importPlan('${l.id}')">⤓ Import plan actions as tasks</button></div>
  </div>`;
}
function addTask(id){
  const l=db.get(id); const title=$('#t_title').value.trim();
  if(!title) return alert('Task description is required.');
  (l.tasks=l.tasks||[]).push({title, owner:$('#t_owner').value.trim(), due:$('#t_due').value, phase:$('#t_phase').value, status:'pending'});
  db.upsert(l); viewLeader(id);
}
function cycleTask(id,i){
  const l=db.get(id); const t=l.tasks[i];
  t.status = T_STATUS[(T_STATUS.indexOf(t.status)+1)%T_STATUS.length];
  db.upsert(l); viewLeader(id);
}
function delTask(id,i){ const l=db.get(id); l.tasks.splice(i,1); db.upsert(l); viewLeader(id); }
function importPlan(id){
  const l=db.get(id); l.tasks=l.tasks||[];
  const today=new Date(); today.setHours(0,0,0,0);
  const eday=l.electionDate?new Date(l.electionDate):null;
  const end=(eday&&!isNaN(eday)&&eday>today)?eday:new Date(today.getTime()+365*864e5);
  const span=end-today; let added=0;
  PHASES.forEach(p=>{
    const due=new Date(today.getTime()+span*p[2]).toISOString().slice(0,10);
    p[4].filter(a=>!a[0]||l.services.includes(a[0])).forEach(a=>{
      if(!l.tasks.some(t=>t.title===a[1])){ l.tasks.push({title:a[1],owner:'',due,phase:p[0],status:'pending'}); added++; }
    });
  });
  db.upsert(l); viewLeader(id);
  if(!added) alert('All plan actions are already in the tracker.');
}

/* ---------- Service Module: Ground Pulse (gp) ---------- */
/* l.gp = {issues:[{n,sev(1-5)}], waves:[{date,sample,fav,note}]} */
const SEV_COL=['','#6B7A8D','#1E7A3C','var(--gold)','#D9662B','#B3261E'];
const SEV_LABEL=['','Low','Mild','Rising','Hot','Explosive'];
function renderGP(l){
  if(!l.services.includes('gp')) return '';
  const g=l.gp||{issues:[],waves:[]};
  const issues=[...g.issues].sort((a,b)=>b.sev-a.sev);
  const irows=issues.length?issues.map(it=>{
    const i=g.issues.indexOf(it);
    return `<div class="trow">
      <button class="st" style="background:${SEV_COL[it.sev]};color:#fff;min-width:110px" onclick="gpCycleSev('${l.id}',${i})" title="Click to escalate/reset">${SEV_LABEL[it.sev]} ${'●'.repeat(it.sev)}</button>
      <span class="tt">${esc(it.n)}</span>
      <button class="tdel" onclick="gpDelIssue('${l.id}',${i})" title="Delete issue">✕</button>
    </div>`;}).join('')
    :'<p style="color:var(--muted)">No issues logged — add what the ground is talking about.</p>';
  const waves=g.waves;
  const wrows=waves.length?waves.map((w,i)=>{
    const prev=i>0?waves[i-1].fav:null;
    const d=prev!==null?(w.fav-prev):null;
    return `<div class="trow">
      <span class="tmeta" style="min-width:110px">${esc(w.date||'—')}</span>
      <span class="tt">Wave ${i+1}${w.note?' — '+esc(w.note):''}</span>
      <span class="tmeta">${(+w.sample||0).toLocaleString('en-IN')} sampled</span>
      <span class="st" style="background:var(--navy);color:#fff;min-width:90px">${w.fav}% fav</span>
      <span class="tmeta" style="min-width:70px;${d===null?'':d>=0?'color:#1E7A3C;font-weight:700':'color:#B3261E;font-weight:700'}">${d===null?'baseline':(d>=0?'▲ +':'▼ ')+d+' pt'}</span>
      <button class="tdel" onclick="gpDelWave('${l.id}',${i})" title="Delete wave">✕</button>
    </div>`;}).join('')
    :'<p style="color:var(--muted)">No survey waves yet — record the first wave to set the baseline.</p>';
  return `<div class="card"><h2>📡 Ground Pulse</h2>
    <div class="sub">Voter intelligence: what the ground is saying, and whether the leader's standing is moving.</div>
    <h3 style="font-size:19px;color:var(--navy);margin-bottom:8px">Live Issues</h3>
    ${irows}
    <div class="taddgrid" style="grid-template-columns:2fr 1fr auto">
      <div><label>New Issue *</label><input id="gp_issue" placeholder="e.g. Drinking water shortage in northern hoblis"></div>
      <div><label>Intensity</label><select id="gp_sev">${[1,2,3,4,5].map(s=>`<option value="${s}" ${s===3?'selected':''}>${SEV_LABEL[s]}</option>`).join('')}</select></div>
      <div><button class="btn btn-navy btn-sm" onclick="gpAddIssue('${l.id}')">+ Add</button></div>
    </div>
    <h3 style="font-size:19px;color:var(--navy);margin:24px 0 8px">Survey Waves — Leader Favorability</h3>
    ${wrows}
    <div class="taddgrid" style="grid-template-columns:1fr 1fr 1fr 2fr auto">
      <div><label>Date</label><input id="gp_date" type="date"></div>
      <div><label>Sample Size</label><input id="gp_sample" type="number" min="0"></div>
      <div><label>Favorability % *</label><input id="gp_fav" type="number" min="0" max="100"></div>
      <div><label>Note</label><input id="gp_note" placeholder="e.g. post-rally wave, 40 booths"></div>
      <div><button class="btn btn-navy btn-sm" onclick="gpAddWave('${l.id}')">+ Add</button></div>
    </div>
  </div>`;
}
function gpAddIssue(id){
  const l=db.get(id); const n=$('#gp_issue').value.trim();
  if(!n) return alert('Issue description is required.');
  l.gp=l.gp||{issues:[],waves:[]};
  l.gp.issues.push({n,sev:+$('#gp_sev').value||3});
  db.upsert(l); viewLeader(id);
}
function gpCycleSev(id,i){ const l=db.get(id); const it=l.gp.issues[i]; it.sev=it.sev%5+1; db.upsert(l); viewLeader(id); }
function gpDelIssue(id,i){ const l=db.get(id); l.gp.issues.splice(i,1); db.upsert(l); viewLeader(id); }
function gpAddWave(id){
  const l=db.get(id); const fav=$('#gp_fav').value;
  if(fav==='') return alert('Favorability % is required.');
  l.gp=l.gp||{issues:[],waves:[]};
  l.gp.waves.push({date:$('#gp_date').value,sample:+$('#gp_sample').value||0,fav:Math.max(0,Math.min(100,+fav)),note:$('#gp_note').value.trim()});
  db.upsert(l); viewLeader(id);
}
function gpDelWave(id,i){ const l=db.get(id); l.gp.waves.splice(i,1); db.upsert(l); viewLeader(id); }

/* ---------- Service Module: Candidate Blueprint (cb) ---------- */
/* l.cb = {slogan, positioning, strengths:[], vulns:[], promises:[{p,status}]} */
const P_ST=['announced','working','delivered'];
const P_LABEL={announced:'Announced',working:'In Motion',delivered:'Delivered ✓'};
const P_CLS={announced:'pending',working:'progress',delivered:'done'};
function renderCB(l){
  if(!l.services.includes('cb')) return '';
  const c=l.cb||{strengths:[],vulns:[],promises:[]};
  const list=(arr,key,empty)=>arr.length?arr.map((s,i)=>`<div class="trow">
      <span class="tt">${esc(s)}</span>
      <button class="tdel" onclick="cbDelItem('${l.id}','${key}',${i})" title="Delete">✕</button>
    </div>`).join('') : `<p style="color:var(--muted)">${empty}</p>`;
  const prows=c.promises.length?c.promises.map((p,i)=>`<div class="trow">
      <button class="st ${P_CLS[p.status]}" onclick="cbCyclePromise('${l.id}',${i})" title="Click to change status">${P_LABEL[p.status]}</button>
      <span class="tt">${esc(p.p)}</span>
      <button class="tdel" onclick="cbDelPromise('${l.id}',${i})" title="Delete promise">✕</button>
    </div>`).join('') : '<p style="color:var(--muted)">No promises recorded — every public commitment goes here, so nothing is forgotten after the applause.</p>';
  return `<div class="card"><h2>🧭 Candidate Blueprint</h2>
    <div class="sub">The leader's positioning: one story, told consistently, with promises tracked to delivery.</div>
    <div class="fgrid">
      <div><label>One-Line Promise / Slogan</label><input id="cb_slogan" value="${esc(c.slogan||'')}" placeholder="e.g. ನಮ್ಮ ನೀರು, ನಮ್ಮ ಹಕ್ಕು — water for every farm by 2029" onchange="cbSetField('${l.id}','slogan',this.value)"></div>
      <div><label>Positioning Statement</label><input id="cb_pos" value="${esc(c.positioning||'')}" placeholder="Who the leader is, for whom, against what" onchange="cbSetField('${l.id}','positioning',this.value)"></div>
    </div>
    <div class="fgrid" style="margin-top:20px">
      <div><h3 style="font-size:19px;color:#1E7A3C;margin-bottom:8px">Strengths — amplify</h3>
        ${list(c.strengths,'strengths','What works for the leader — record it.')}
        <div class="taddgrid" style="grid-template-columns:1fr auto">
          <div><input id="cb_str" placeholder="e.g. Cross-community acceptability"></div>
          <div><button class="btn btn-navy btn-sm" onclick="cbAddItem('${l.id}','strengths','cb_str')">+ Add</button></div>
        </div>
      </div>
      <div><h3 style="font-size:19px;color:#B3261E;margin-bottom:8px">Vulnerabilities — inoculate</h3>
        ${list(c.vulns,'vulns','What rivals will attack — name it before they do.')}
        <div class="taddgrid" style="grid-template-columns:1fr auto">
          <div><input id="cb_vul" placeholder="e.g. Seen as outsider in southern hoblis"></div>
          <div><button class="btn btn-navy btn-sm" onclick="cbAddItem('${l.id}','vulns','cb_vul')">+ Add</button></div>
        </div>
      </div>
    </div>
    <h3 style="font-size:19px;color:var(--navy);margin:24px 0 8px">Promise Book</h3>
    ${prows}
    <div class="taddgrid" style="grid-template-columns:1fr auto">
      <div><label>New Promise *</label><input id="cb_prom" placeholder="e.g. Ring road land compensation settled within 6 months"></div>
      <div><button class="btn btn-navy btn-sm" onclick="cbAddPromise('${l.id}')">+ Add</button></div>
    </div>
  </div>`;
}
function cbInit(l){ l.cb=l.cb||{strengths:[],vulns:[],promises:[]}; return l.cb; }
function cbSetField(id,k,v){ const l=db.get(id); cbInit(l)[k]=v.trim(); db.upsert(l); }
function cbAddItem(id,key,inp){
  const l=db.get(id); const v=$('#'+inp).value.trim();
  if(!v) return alert('Text is required.');
  cbInit(l)[key].push(v); db.upsert(l); viewLeader(id);
}
function cbDelItem(id,key,i){ const l=db.get(id); l.cb[key].splice(i,1); db.upsert(l); viewLeader(id); }
function cbAddPromise(id){
  const l=db.get(id); const p=$('#cb_prom').value.trim();
  if(!p) return alert('Promise text is required.');
  cbInit(l).promises.push({p,status:'announced'}); db.upsert(l); viewLeader(id);
}
function cbCyclePromise(id,i){ const l=db.get(id); const p=l.cb.promises[i]; p.status=P_ST[(P_ST.indexOf(p.status)+1)%P_ST.length]; db.upsert(l); viewLeader(id); }
function cbDelPromise(id,i){ const l=db.get(id); l.cb.promises.splice(i,1); db.upsert(l); viewLeader(id); }

/* ---------- Service Module: Campaign Command (cc) ---------- */
/* l.cc = {team:[{name,role,zone,phone,last}]} — last = ISO date of last check-in */
const CC_ROLES=['Campaign Manager','Zone In-charge','Block In-charge','Booth Coordinator','Volunteer Lead','Social Media Head','Logistics','Legal / ECI Compliance'];
function ccDays(last){
  if(!last) return null;
  const t=new Date(); t.setHours(0,0,0,0);
  return Math.round((t-new Date(last))/864e5);
}
function renderCC(l){
  if(!l.services.includes('cc')) return '';
  const team=(l.cc&&l.cc.team)||[];
  const silent=team.filter(m=>{const d=ccDays(m.last); return d===null||d>2;}).length;
  const today=new Date().toISOString().slice(0,10);
  const checkedToday=team.filter(m=>m.last===today).length;
  const summary=team.length?`<div class="btotals">
      <div class="cbox"><div class="n">${team.length}</div><div class="l">FIELD TEAM</div></div>
      <div class="cbox"><div class="n">${new Set(team.map(m=>m.zone).filter(Boolean)).size}</div><div class="l">ZONES COVERED</div></div>
      <div class="cbox"><div class="n" style="color:#1E7A3C">${checkedToday}</div><div class="l">REPORTED TODAY</div></div>
      <div class="cbox ${silent?'hot':''}"><div class="n">${silent}</div><div class="l">SILENT &gt;2 DAYS</div></div>
    </div>`:'';
  const rows=team.length?[...team].map((m,i)=>{
    const d=ccDays(m.last);
    const st=d===null?['No report yet','#B3261E']:d===0?['Reported today','#1E7A3C']:d<=2?[d+'d ago','var(--muted)']:[d+'d silent ⚠','#B3261E'];
    return `<div class="trow ${d!==null&&d===0?'':''}">
      <span class="tt"><b>${esc(m.name)}</b> — ${esc(m.role)}${m.zone?` <span class="svctag">${esc(m.zone)}</span>`:''}</span>
      <span class="tmeta">${esc(m.phone||'')}</span>
      <span class="tmeta" style="min-width:130px;color:${st[1]};font-weight:700">${st[0]}</span>
      <button class="st progress" onclick="ccCheckin('${l.id}',${i})" title="Mark today's report received">✓ Check-in</button>
      <button class="tdel" onclick="ccDel('${l.id}',${i})" title="Remove member">✕</button>
    </div>`;}).join('')
    :'<p style="color:var(--muted)">No field team yet — a campaign without named owners per zone is a rally, not a machine.</p>';
  return `<div class="card"><h2>🎖 Campaign Command</h2>
    <div class="sub">Field organisation: who owns which zone, and whether reports are coming in daily.</div>
    ${summary}${rows}
    <div class="taddgrid" style="grid-template-columns:1.5fr 1fr 1fr 1fr auto">
      <div><label>Name *</label><input id="cc_name" placeholder="e.g. Mahesh Patil"></div>
      <div><label>Role</label><select id="cc_role">${CC_ROLES.map(r=>`<option>${r}</option>`).join('')}</select></div>
      <div><label>Zone / Block</label><input id="cc_zone" placeholder="e.g. Ugar block"></div>
      <div><label>Phone</label><input id="cc_phone"></div>
      <div><button class="btn btn-navy btn-sm" onclick="ccAdd('${l.id}')">+ Add</button></div>
    </div>
  </div>`;
}
function ccAdd(id){
  const l=db.get(id); const name=$('#cc_name').value.trim();
  if(!name) return alert('Member name is required.');
  l.cc=l.cc||{team:[]};
  l.cc.team.push({name,role:$('#cc_role').value,zone:$('#cc_zone').value.trim(),phone:$('#cc_phone').value.trim(),last:''});
  db.upsert(l); viewLeader(id);
}
function ccCheckin(id,i){ const l=db.get(id); l.cc.team[i].last=new Date().toISOString().slice(0,10); db.upsert(l); viewLeader(id); }
function ccDel(id,i){ const l=db.get(id); l.cc.team.splice(i,1); db.upsert(l); viewLeader(id); }

/* ---------- Service Module: Digital Mandate (dm) ---------- */
/* l.dm = {channels:[{ch,handle,followers,prev}], posts:[{date,title,ch,status planned|posted}]} */
const DM_CH=['WhatsApp Network','Facebook','Instagram','YouTube','X (Twitter)','ShareChat / Koo','Telegram'];
function renderDM(l){
  if(!l.services.includes('dm')) return '';
  const d=l.dm||{channels:[],posts:[]};
  const reach=d.channels.reduce((s,c)=>s+(+c.followers||0),0);
  const today=new Date().toISOString().slice(0,10);
  const overdue=d.posts.filter(p=>p.status==='planned'&&p.date&&p.date<today).length;
  const week=new Date(Date.now()-7*864e5).toISOString().slice(0,10);
  const posted7=d.posts.filter(p=>p.status==='posted'&&p.date>=week).length;
  const summary=(d.channels.length||d.posts.length)?`<div class="btotals">
      <div class="cbox"><div class="n">${reach.toLocaleString('en-IN')}</div><div class="l">TOTAL REACH (FOLLOWERS / MEMBERS)</div></div>
      <div class="cbox"><div class="n">${d.channels.length}</div><div class="l">CHANNELS LIVE</div></div>
      <div class="cbox"><div class="n" style="color:#1E7A3C">${posted7}</div><div class="l">POSTED LAST 7 DAYS</div></div>
      <div class="cbox ${overdue?'hot':''}"><div class="n">${overdue}</div><div class="l">CONTENT OVERDUE</div></div>
    </div>`:'';
  const crows=d.channels.length?d.channels.map((c,i)=>{
    const g=(+c.followers||0)-(+c.prev||0);
    return `<div class="trow">
      <span class="tt"><b>${esc(c.ch)}</b>${c.handle?' — '+esc(c.handle):''}</span>
      <span class="tmeta">Reach: <input class="binp" type="number" min="0" style="width:110px" value="${+c.followers||0}"
        onchange="dmSetReach('${l.id}',${i},this.value)" title="Update follower/member count"></span>
      <span class="tmeta" style="min-width:110px;${g>0?'color:#1E7A3C;font-weight:700':g<0?'color:#B3261E;font-weight:700':''}">${c.prev===undefined?'new':(g>=0?'▲ +':'▼ ')+g.toLocaleString('en-IN')}</span>
      <button class="tdel" onclick="dmDelCh('${l.id}',${i})" title="Remove channel">✕</button>
    </div>`;}).join('')
    :'<p style="color:var(--muted)">No channels yet — the WhatsApp network is usually the first and most decisive one.</p>';
  const prows=d.posts.length?[...d.posts].sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(p=>{
    const i=d.posts.indexOf(p);
    const late=p.status==='planned'&&p.date&&p.date<today;
    return `<div class="trow ${p.status==='posted'?'done':''}">
      <button class="st ${p.status==='posted'?'done':'pending'}" onclick="dmCyclePost('${l.id}',${i})">${p.status==='posted'?'Posted ✓':'Planned'}</button>
      <span class="tt">${esc(p.title)} <span class="svctag">${esc(p.ch)}</span></span>
      <span class="tmeta ${late?'late':''}">${p.date?(late?'⚠ ':'')+p.date:''}</span>
      <button class="tdel" onclick="dmDelPost('${l.id}',${i})" title="Delete">✕</button>
    </div>`;}).join('')
    :'<p style="color:var(--muted)">No content planned — silence online is surrender online.</p>';
  return `<div class="card"><h2>📱 Digital Mandate</h2>
    <div class="sub">Channels, reach growth, and a content calendar that keeps the feed alive.</div>
    ${summary}
    <h3 style="font-size:19px;color:var(--navy);margin-bottom:8px">Channels</h3>
    ${crows}
    <div class="taddgrid" style="grid-template-columns:1fr 1fr 1fr auto">
      <div><label>Channel</label><select id="dm_ch">${DM_CH.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div><label>Handle / Group Name</label><input id="dm_handle" placeholder="e.g. @kagwad4dev"></div>
      <div><label>Current Reach</label><input id="dm_fol" type="number" min="0"></div>
      <div><button class="btn btn-navy btn-sm" onclick="dmAddCh('${l.id}')">+ Add</button></div>
    </div>
    <h3 style="font-size:19px;color:var(--navy);margin:24px 0 8px">Content Calendar</h3>
    ${prows}
    <div class="taddgrid" style="grid-template-columns:2fr 1fr 1fr auto">
      <div><label>Content *</label><input id="dm_title" placeholder="e.g. Reel: sugarcane arrears — farmer voices"></div>
      <div><label>Channel</label><select id="dm_pch">${DM_CH.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div><label>Date</label><input id="dm_date" type="date"></div>
      <div><button class="btn btn-navy btn-sm" onclick="dmAddPost('${l.id}')">+ Add</button></div>
    </div>
  </div>`;
}
function dmInit(l){ l.dm=l.dm||{channels:[],posts:[]}; return l.dm; }
function dmAddCh(id){
  const l=db.get(id); const ch=$('#dm_ch').value;
  dmInit(l).channels.push({ch,handle:$('#dm_handle').value.trim(),followers:+$('#dm_fol').value||0});
  db.upsert(l); viewLeader(id);
}
function dmSetReach(id,i,v){ const l=db.get(id); const c=l.dm.channels[i]; c.prev=+c.followers||0; c.followers=+v||0; db.upsert(l); viewLeader(id); }
function dmDelCh(id,i){ const l=db.get(id); l.dm.channels.splice(i,1); db.upsert(l); viewLeader(id); }
function dmAddPost(id){
  const l=db.get(id); const t=$('#dm_title').value.trim();
  if(!t) return alert('Content description is required.');
  dmInit(l).posts.push({date:$('#dm_date').value,title:t,ch:$('#dm_pch').value,status:'planned'});
  db.upsert(l); viewLeader(id);
}
function dmCyclePost(id,i){ const l=db.get(id); const p=l.dm.posts[i]; p.status=p.status==='planned'?'posted':'planned'; if(p.status==='posted'&&!p.date)p.date=new Date().toISOString().slice(0,10); db.upsert(l); viewLeader(id); }
function dmDelPost(id,i){ const l=db.get(id); l.dm.posts.splice(i,1); db.upsert(l); viewLeader(id); }

/* ---------- Service Module: War Room (wr) ---------- */
/* l.wr = {incidents:[{t,src,sev(1-3),opened,closed,resp}]} — 2-hour response target */
const WR_SEV={1:['Watch','var(--muted)'],2:['Serious','#D9662B'],3:['CRISIS','#B3261E']};
const WR_SLA_MS=2*3600e3;
function wrAge(inc){ return (inc.closed?new Date(inc.closed):new Date())-new Date(inc.opened); }
function wrFmt(ms){ const h=Math.floor(ms/3600e3), m=Math.round(ms%3600e3/60e3); return h?`${h}h ${m}m`:`${m}m`; }
function renderWR(l){
  if(!l.services.includes('wr')) return '';
  const inc=(l.wr&&l.wr.incidents)||[];
  const open=inc.filter(x=>!x.closed);
  const breach=open.filter(x=>wrAge(x)>WR_SLA_MS);
  const closed=inc.filter(x=>x.closed);
  const avg=closed.length?closed.reduce((s,x)=>s+wrAge(x),0)/closed.length:0;
  const summary=inc.length?`<div class="btotals">
      <div class="cbox ${open.length?'hot':''}"><div class="n">${open.length}</div><div class="l">OPEN NOW</div></div>
      <div class="cbox ${breach.length?'hot':''}"><div class="n">${breach.length}</div><div class="l">BREACHING 2-HOUR TARGET</div></div>
      <div class="cbox"><div class="n" style="color:#1E7A3C">${closed.length}</div><div class="l">RESOLVED</div></div>
      <div class="cbox"><div class="n">${closed.length?wrFmt(avg):'—'}</div><div class="l">AVG RESPONSE TIME</div></div>
    </div>`:'';
  const rows=inc.length?[...inc].sort((a,b)=>(a.closed?1:0)-(b.closed?1:0)||b.sev-a.sev).map(x=>{
    const i=inc.indexOf(x);
    const age=wrAge(x); const late=!x.closed&&age>WR_SLA_MS;
    const [sl,sc]=WR_SEV[x.sev];
    return `<div class="trow ${x.closed?'done':''}">
      <span class="st" style="background:${x.closed?'var(--mist)':sc};color:${x.closed?'var(--muted)':'#fff'};min-width:96px">${sl}</span>
      <span class="tt">${esc(x.t)}${x.src?` <span class="svctag">${esc(x.src)}</span>`:''}${x.resp?`<br><span style="font-size:16px;color:var(--muted)">↳ ${esc(x.resp)}</span>`:''}</span>
      <span class="tmeta" style="min-width:130px;${late?'color:#B3261E;font-weight:700':''}">${x.closed?'closed in '+wrFmt(age):(late?'⏱ OPEN '+wrFmt(age)+' ⚠':'⏱ open '+wrFmt(age))}</span>
      ${x.closed?'':`<button class="st done" onclick="wrResolve('${l.id}',${i})">✓ Resolve</button>`}
      <button class="tdel" onclick="wrDel('${l.id}',${i})" title="Delete">✕</button>
    </div>`;}).join('')
    :'<p style="color:var(--muted)">No incidents logged. When a rumour starts, the clock starts — log it the moment it surfaces.</p>';
  return `<div class="card"><h2>🚨 War Room</h2>
    <div class="sub">Rumours, attacks, incidents — logged, clocked, answered. Target: response within 2 hours.</div>
    ${summary}${rows}
    <div class="taddgrid" style="grid-template-columns:2fr 1fr 1fr auto">
      <div><label>Incident / Rumour *</label><input id="wr_t" placeholder="e.g. Fake letter circulating about ticket denial"></div>
      <div><label>Where Spotted</label><input id="wr_src" placeholder="e.g. WhatsApp / local TV / rival rally"></div>
      <div><label>Severity</label><select id="wr_sev"><option value="1">Watch</option><option value="2" selected>Serious</option><option value="3">CRISIS</option></select></div>
      <div><button class="btn btn-navy btn-sm" onclick="wrAdd('${l.id}')">+ Log</button></div>
    </div>
  </div>`;
}

/* ---------- Service Module: Governance Connect (gc) ---------- */
/* l.gc = {griev:[{t,who,loc,cat,rec,status open|working|resolved,note}]} */
const GC_CATS=['Water','Roads','Electricity','Health','Education','Ration / Pension','Land / Revenue','Jobs / Livelihood','Other'];
const GC_ST=['open','working','resolved'];
const GC_LABEL={open:'Open',working:'In Progress',resolved:'Resolved ✓'};
const GC_CLS={open:'pending',working:'progress',resolved:'done'};
function gcDaysOpen(g){
  const end=g.status==='resolved'?new Date(g.done||g.rec):new Date();
  return Math.max(0,Math.round((end-new Date(g.rec))/864e5));
}
function renderGC(l){
  if(!l.services.includes('gc')) return '';
  const G=(l.gc&&l.gc.griev)||[];
  const open=G.filter(g=>g.status!=='resolved');
  const res=G.filter(g=>g.status==='resolved');
  const rate=G.length?Math.round(res.length/G.length*100):0;
  const oldest=open.length?Math.max(...open.map(gcDaysOpen)):0;
  const summary=G.length?`<div class="btotals">
      <div class="cbox ${open.length?'hot':''}"><div class="n">${open.length}</div><div class="l">PENDING</div></div>
      <div class="cbox"><div class="n" style="color:#1E7A3C">${res.length}</div><div class="l">RESOLVED</div></div>
      <div class="cbox ${rate<50&&G.length>3?'hot':''}"><div class="n">${rate}%</div><div class="l">RESOLUTION RATE</div></div>
      <div class="cbox ${oldest>30?'hot':''}"><div class="n">${oldest}d</div><div class="l">OLDEST PENDING</div></div>
    </div>`:'';
  const rows=G.length?[...G].sort((a,b)=>(a.status==='resolved'?1:0)-(b.status==='resolved'?1:0)||gcDaysOpen(b)-gcDaysOpen(a)).map(g=>{
    const i=G.indexOf(g); const d=gcDaysOpen(g);
    return `<div class="trow ${g.status==='resolved'?'done':''}">
      <button class="st ${GC_CLS[g.status]}" onclick="gcCycle('${l.id}',${i})" title="Click to move forward">${GC_LABEL[g.status]}</button>
      <span class="tt">${esc(g.t)} <span class="svctag">${esc(g.cat)}</span>${g.who||g.loc?`<br><span style="font-size:16px;color:var(--muted)">${esc(g.who||'')}${g.who&&g.loc?' · ':''}${esc(g.loc||'')}</span>`:''}${g.note?`<br><span style="font-size:16px;color:#1E7A3C">↳ ${esc(g.note)}</span>`:''}</span>
      <span class="tmeta" style="min-width:110px;${g.status!=='resolved'&&d>30?'color:#B3261E;font-weight:700':''}">${g.status==='resolved'?'closed in '+d+'d':d+'d pending'}</span>
      <button class="tdel" onclick="gcDel('${l.id}',${i})" title="Delete">✕</button>
    </div>`;}).join('')
    :'<p style="color:var(--muted)">No grievances registered. Every request taken at a janata darshan or camp belongs here — the resolved list becomes the governance story.</p>';
  return `<div class="card"><h2>🤝 Governance Connect</h2>
    <div class="sub">Citizen grievances in, visible delivery out. Trust is built one resolved complaint at a time.</div>
    ${summary}${rows}
    <div class="taddgrid" style="grid-template-columns:2fr 1fr 1fr 1fr auto">
      <div><label>Grievance *</label><input id="gc_t" placeholder="e.g. Borewell dry for 3 weeks, tanker irregular"></div>
      <div><label>Citizen / Group</label><input id="gc_who" placeholder="e.g. Basavraj, farmers' sangha"></div>
      <div><label>Village / Ward</label><input id="gc_loc" placeholder="e.g. Shirguppi"></div>
      <div><label>Category</label><select id="gc_cat">${GC_CATS.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div><button class="btn btn-navy btn-sm" onclick="gcAdd('${l.id}')">+ Register</button></div>
    </div>
  </div>`;
}
function gcAdd(id){
  const l=db.get(id); const t=$('#gc_t').value.trim();
  if(!t) return alert('Grievance description is required.');
  l.gc=l.gc||{griev:[]};
  l.gc.griev.push({t,who:$('#gc_who').value.trim(),loc:$('#gc_loc').value.trim(),cat:$('#gc_cat').value,
    rec:new Date().toISOString().slice(0,10),status:'open',note:''});
  db.upsert(l); viewLeader(id);
}
function gcCycle(id,i){
  const l=db.get(id); const g=l.gc.griev[i];
  g.status=GC_ST[(GC_ST.indexOf(g.status)+1)%GC_ST.length];
  if(g.status==='resolved'){ g.done=new Date().toISOString().slice(0,10); g.note=(prompt('How was it resolved? (shown as the delivery record)')||'').trim(); }
  else { g.done=''; g.note=''; }
  db.upsert(l); viewLeader(id);
}
function gcDel(id,i){ const l=db.get(id); l.gc.griev.splice(i,1); db.upsert(l); viewLeader(id); }

/* ---------- Service Module: Astro-Strategy Advisory (as) ---------- */
/* l.as = {mu:[{date,time,purpose,note,conf}]} — guidance from RAAYA Muhurta framework */

 'Nomination filing':   ['Mon / Wed / Thu','Rohini, Hasta, Anuradha','Rahu kala, Amavasya'],

function setBoothNum(id,i,k,v){ const l=db.get(id); l.booths[i][k]=+v||0; db.upsert(l); viewLeader(id); }

/* ---------- Step 4: Budget ---------- */
/* Budget line: {desc, svc, planned, actual} — amounts in ₹ */
const BAND_MID = {'Under 10 Lakh':8e5,'10–50 Lakh':3e6,'50 Lakh – 2 Crore':1.2e7,'2–10 Crore':6e7,'Above 10 Crore':1.5e8,'To be discussed':0};
/* default share of budget per service (renormalised over selected ones) */
const SVC_SHARE = {gp:.15,cb:.10,cc:.25,dm:.18,wr:.12,gc:.10,as:.02,mr:.08};
const inr = n=>'₹'+Math.round(n).toLocaleString('en-IN');

function renderBudget(l){
  const B = l.budget||[];
  const planned = B.reduce((s,b)=>s+(+b.planned||0),0);
  const actual  = B.reduce((s,b)=>s+(+b.actual||0),0);
  const band = BAND_MID[l.budgetBand]||0;
  const remain = planned-actual;

  const totals = `<div class="btotals">
    <div class="cbox"><div class="n">${inr(planned)}</div><div class="l">PLANNED</div></div>
    <div class="cbox ${actual>planned&&planned?'hot':''}"><div class="n">${inr(actual)}</div><div class="l">SPENT</div></div>
    <div class="cbox ${remain<0?'hot':''}"><div class="n">${inr(remain)}</div><div class="l">REMAINING</div></div>
    ${band?`<div class="cbox ${planned>band?'hot':''}"><div class="n">${Math.round(planned/band*100)}%</div><div class="l">OF ${esc(l.budgetBand).toUpperCase()} BAND</div></div>`:''}
  </div>`;

  const rows = B.length ? B.map((b,i)=>{
    const over = (+b.actual||0) > (+b.planned||0) && +b.planned>0;
    return `<tr>
      <td>${esc(b.desc)}</td>
      <td>${b.svc?esc((SERVICES.find(s=>s[0]===b.svc)||[,b.svc])[1]):'—'}</td>
      <td class="num"><input class="cell" type="number" min="0" value="${+b.planned||0}" onchange="setBud('${l.id}',${i},'planned',this.value)"></td>
      <td class="num ${over?'over':''}"><input class="cell" type="number" min="0" value="${+b.actual||0}" onchange="setBud('${l.id}',${i},'actual',this.value)"></td>
      <td class="num ${over?'over':''}">${inr((+b.planned||0)-(+b.actual||0))}</td>
      <td><button class="tdel" onclick="delBud('${l.id}',${i})" title="Delete line">✕</button></td>
    </tr>`;
  }).join('') : `<tr><td colspan="6" style="color:var(--muted)">No budget lines yet — add one below, or generate a suggested allocation from the engaged services.</td></tr>`;

  return `<div class="card"><h2>Budget</h2>
    <div class="sub">Planned vs actual spend. Edit amounts inline — totals update on change. Band: ₹ ${esc(l.budgetBand)}.</div>
    ${totals}
    <table class="btab"><thead><tr><th>Line Item</th><th>Service</th><th class="num">Planned ₹</th><th class="num">Actual ₹</th><th class="num">Balance</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table>
    <div class="taddgrid">
      <div><label>New Line Item *</label><input id="b_desc" placeholder="e.g. Booth survey wave 1 — field team"></div>
      <div><label>Service</label><select id="b_svc"><option value="">—</option>${l.services.map(k=>`<option value="${k}">${SERVICES.find(s=>s[0]===k)[1]}</option>`).join('')}</select></div>
      <div><label>Planned ₹</label><input id="b_planned" type="number" min="0"></div>
      <div><label>Actual ₹</label><input id="b_actual" type="number" min="0" value="0"></div>
      <div><button class="btn btn-navy btn-sm" onclick="addBud('${l.id}')">+ Add</button></div>
    </div>
    ${band?`<div style="margin-top:14px"><button class="btn btn-gold btn-sm" onclick="suggestBud('${l.id}')">⤓ Suggest allocation from budget band</button></div>`:''}
  </div>`;
}
function addBud(id){
  const l=db.get(id); const desc=$('#b_desc').value.trim();
  if(!desc) return alert('Line item description is required.');
  (l.budget=l.budget||[]).push({desc, svc:$('#b_svc').value, planned:+$('#b_planned').value||0, actual:+$('#b_actual').value||0});
  db.upsert(l); viewLeader(id);
}
function setBud(id,i,k,v){ const l=db.get(id); l.budget[i][k]=+v||0; db.upsert(l); viewLeader(id); }
function delBud(id,i){ const l=db.get(id); l.budget.splice(i,1); db.upsert(l); viewLeader(id); }
function suggestBud(id){
  const l=db.get(id); l.budget=l.budget||[];
  const band=BAND_MID[l.budgetBand]||0; if(!band) return;
  const totalShare=l.services.reduce((s,k)=>s+(SVC_SHARE[k]||.05),0)+ .1; /* +10% contingency */
  let added=0;
  l.services.forEach(k=>{
    const name=SERVICES.find(s=>s[0]===k)[1];
    if(!l.budget.some(b=>b.svc===k&&b.auto)){ l.budget.push({desc:name+' — programme budget',svc:k,planned:Math.round(band*(SVC_SHARE[k]||.05)/totalShare),actual:0,auto:1}); added++; }
  });
  if(!l.budget.some(b=>b.auto==='cont')){ l.budget.push({desc:'Contingency & rapid response reserve',svc:'',planned:Math.round(band*.1/totalShare),actual:0,auto:'cont'}); added++; }
  db.upsert(l); viewLeader(id);
  if(!added) alert('Suggested allocation already generated.');
}

/* ---------- WhatsApp daily digest ---------- */
function shareDigest(id){
  const l=db.get(id); if(!l) return;
  const today=new Date(); today.setHours(0,0,0,0);
  const iso=today.toISOString().slice(0,10);
  const e=l.electionDate?new Date(l.electionDate):null;
  const days=(e&&!isNaN(e)&&e>today)?Math.ceil((e-today)/864e5):null;
  const T=l.tasks||[];
  const overdue=T.filter(t=>t.due&&t.due<iso&&t.status!=='done');
  const dueToday=T.filter(t=>t.due===iso&&t.status!=='done');
  const inProg=T.filter(t=>t.status==='progress');
  const done=T.filter(t=>t.status==='done').length;
  const B=l.budget||[];
  const planned=B.reduce((s,b)=>s+(+b.planned||0),0), actual=B.reduce((s,b)=>s+(+b.actual||0),0);
  const BO=l.booths||[];
  const hh=BO.reduce((s,b)=>s+(+b.hh||0),0), hv=BO.reduce((s,b)=>s+(+b.hv||0),0);
  const li=(arr,cap)=>arr.slice(0,cap).map(t=>`  • ${t.title}${t.owner?' — '+t.owner:''}`).join('\n')+(arr.length>cap?`\n  …and ${arr.length-cap} more`:'');
  let msg=`*RAAYA DAILY BRIEF* — ${today.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}\n`
   +`*${l.name}* · ${l.constituency}${days!==null?`\n🗳 *${days} days to poll*`:''}\n`
   +`\n✅ Progress: ${done}/${T.length} tasks done`
   +(overdue.length?`\n\n🔴 *OVERDUE (${overdue.length})*\n${li(overdue,5)}`:'')
   +(dueToday.length?`\n\n🟡 *DUE TODAY (${dueToday.length})*\n${li(dueToday,5)}`:'')
   +(inProg.length?`\n\n🔵 *IN PROGRESS (${inProg.length})*\n${li(inProg,3)}`:'')
   +(hh?`\n\n🚪 Door-to-door: ${hv.toLocaleString('en-IN')}/${hh.toLocaleString('en-IN')} households (${Math.min(100,Math.round(hv/hh*100))}%)`:'')
   +(planned?`\n💰 Budget: ${inr(actual)} spent of ${inr(planned)}`:'')
   +`\n\n_RAAYA — People. Perception. Power._`;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

/* ---------- Team Access (roles/permissions, cloud mode) ---------- */
function renderAccess(l){
  if(!CLOUD) return '';
  const acc=l.access||[];
  const rows=acc.map((e,i)=>`<div class="trow">
    <span class="tt">${esc(e)}${e===CLOUD.user.email?' <span class="badge g">you</span>':''}</span>
    ${CLOUD.isAdmin?`<button class="tdel" onclick="revokeAccess('${l.id}',${i})" title="Revoke access">✕</button>`:''}
  </div>`).join('');
  return `<div class="card"><h2>Team Access</h2>
    <div class="sub">${CLOUD.isAdmin
      ?'Only these signed-in accounts (and admins) can see and work on this leader. The account must also exist in Firebase Authentication → Users.'
      :'Accounts with access to this leader. Ask an admin to change this.'}</div>
    ${rows||'<p style="color:var(--muted)">No staff assigned — only admins can see this leader.</p>'}
    ${CLOUD.isAdmin?`<div class="taddgrid" style="grid-template-columns:2fr auto">
      <div><label>Grant access (email)</label><input id="ac_email" type="email" placeholder="staff@example.com"></div>
      <div><button class="btn btn-navy btn-sm" onclick="grantAccess('${l.id}')">+ Grant</button></div>
    </div>`:''}
  </div>`;
}
function grantAccess(id){
  const l=db.get(id); const e=$('#ac_email').value.trim().toLowerCase();
  if(!/^\S+@\S+\.\S+$/.test(e)) return alert('Enter a valid email address.');
  l.access=l.access||[]; if(l.access.includes(e)) return alert('Already has access.');
  l.access.push(e); db.upsert(l); viewLeader(id);
}
function revokeAccess(id,i){
  const l=db.get(id);
  if(l.access[i]===CLOUD.user.email && !confirm('Remove your own access? (As admin you will still see the leader.)')) return;
  l.access.splice(i,1); db.upsert(l); viewLeader(id);
}

/* ---------- Leader Directory (auth-gated) ---------- */
let DIR = {set:'mla', q:'', party:'', sort:'m'};
/* Estimated 2026 ward voters = ward 2011 pop × (corp 2026 voters / corp 2011 pop). Labelled "est." in UI. */
let _corpPop=null;
function estWardVoters(k){
  if(!window.GBA_VOTERS||!k.pop) return 0;
  if(!_corpPop){ _corpPop={}; (window.GBA2026||[]).forEach(w=>_corpPop[w.corp]=(_corpPop[w.corp]||0)+w.pop); }
  const cv=GBA_VOTERS.corps[k.corp]; const cp=_corpPop[k.corp];
  if(!cv||!cp) return 0;
  return Math.round(k.pop*cv.total/cp/10)*10;
}
function gbaElectorateBanner(){
  const V=window.GBA_VOTERS; if(!V) return '';
  const t=V.total, lk=n=>(n/1e5).toFixed(2)+' L';
  const bars=['Central','North','East','South','West'].map(c=>{const d=V.corps[c];
    return `<div class="cbox"><div class="n" style="font-size:22px">${lk(d.total)}</div><div class="l">${c.toUpperCase()} · ${d.wards} WARDS${d.ns?' *':''}</div></div>`;}).join('');
  return `<div class="card"><h2>GBA 2026 Electorate</h2>
    <div class="sub">Official final electoral rolls, ${esc(V.asof)} — ${t.total.toLocaleString('en-IN')} voters across ${t.wards} wards &amp; ${t.booths.toLocaleString('en-IN')} polling stations.</div>
    <div class="btotals">
      <div class="cbox" style="background:var(--navy)"><div class="n" style="color:var(--gold)">${lk(t.total)}</div><div class="l" style="color:var(--ice)">TOTAL VOTERS</div></div>
      ${bars}
    </div>
    <div class="tlnote">M ${t.m.toLocaleString('en-IN')} · F ${t.f.toLocaleString('en-IN')} · Others ${t.o.toLocaleString('en-IN')}. Corporation figures are official &amp; checksum-verified; <b>*</b> North/South (both 72 wards) assigned by population. Ward rows show a 2026 <i>estimate</i> (2011 census scaled by corporation voter growth) — validated within ~5% of mean against 73 wards recovered from the official ward-count scan, but treat as approximate: true ward electorate isn't published in machine-readable form (only per-station PDFs).</div>
  </div>`;
}
function renderDirectory(){
  if(cloudConfigured() && !CLOUD) return renderLogin('Sign in to access the leader directory.');
  window.__rerender = renderDirectory;
  const isMLC = DIR.set==='mlc', isGBA = DIR.set==='gba';
  const data = isGBA ? window.GBA2026 : isMLC ? window.KA_MLC : DIR.set==='mp' ? window.KA_LS2024 : window.KA2023;
  const parties = isGBA ? [...new Set(data.map(k=>k.resv))].sort()
    : [...new Set(data.flatMap(k=>isMLC?[k.wp]:[k.wp,k.rp]))].sort();
  let rows = data.filter(k=>{
    const q=DIR.q.toLowerCase();
    if(isGBA) return (!q || (k.name+' '+k.corp+' '+k.ac+' '+k.resv).toLowerCase().includes(q))
        && (!DIR.party || k.resv===DIR.party);
    return (!q || (k.c+' '+k.w+' '+(k.r||'')+' '+(k.cat||'')).toLowerCase().includes(q))
        && (!DIR.party || k.wp===DIR.party || k.rp===DIR.party);
  });
  rows.sort(isGBA?(a,b)=>a.corp.localeCompare(b.corp)||a.no-b.no
    :(isMLC||DIR.sort==='c')?(a,b)=>a.c.localeCompare(b.c)||a.w.localeCompare(b.w):(a,b)=>a.m-b.m);
  const cls=k=>{const p=k.m/k.wv*100; return p<8?['MARGINAL','#B3261E']:p<20?['COMPETITIVE','var(--gold)']:['STRONGHOLD','#1E7A3C'];};
  const body = rows.map((k,ri)=>{
    if(isGBA){ const scst=k.pop?Math.round((k.sc+k.st)/k.pop*100):0;
      const ev=estWardVoters(k);
      return `<tr>
      <td><b>Ward ${k.no} — ${esc(k.name)}</b><br><span style="font-size:15px;color:var(--muted)">${esc(k.corp)} Corporation · AC: ${esc(k.ac)}</span></td>
      <td>${ev?'~'+ev.toLocaleString('en-IN')+' voters':k.pop.toLocaleString('en-IN')+' pop.'}<br><span style="font-size:15px;color:var(--muted)">${ev?'est. 2026 · ':''}SC+ST ${scst}%</span></td>
      <td><span class="badge ${/Women/.test(k.resv)?'g':''}">${esc(k.resv)}</span></td>
      <td><button class="btn btn-navy btn-sm" onclick="onboardFromDir('gba','${ri}')">Onboard →</button></td></tr>`; }
    if(isMLC) return `<tr>
      <td><b>${esc(k.c)}</b><br><span style="font-size:15px;color:var(--muted)">${esc(k.cat)}</span></td>
      <td>${esc(k.w)}<br><span class="badge g">${esc(k.wp)}</span></td>
      <td><span style="color:var(--muted)">Term ends ${esc(k.te)}</span></td>
      <td><button class="btn btn-navy btn-sm" onclick="onboardFromDir('mlc','${ri}')">Onboard →</button></td></tr>`;
    const [lab,col]=cls(k);
    const dd=(DIR.set==='mla'&&window.KA_DOSSIER)?KA_DOSSIER[k.c]:null;
    const dinfo=dd?`<br><span style="font-size:15px;color:${dd.cases>0?'#B3261E':'var(--muted)'}">⚖ ${dd.cases} case${dd.cases===1?'':'s'} · ₹${dd.assets>=1e7?(dd.assets/1e7).toFixed(1)+' Cr':(dd.assets/1e5).toFixed(0)+' L'}</span>`:'';
    return `<tr>
    <td><b>${esc(k.c)}</b><br><span style="font-size:15px;color:var(--muted)">margin ${k.m.toLocaleString('en-IN')} · <b style="color:${col}">${lab}</b></span></td>
    <td>${esc(k.w)}<br><span class="badge g">${esc(k.wp)}</span> <span style="font-size:15px;color:var(--muted)">${k.wv.toLocaleString('en-IN')}</span>${dinfo}</td>
    <td>${esc(k.r)}<br><span class="badge">${esc(k.rp)}</span> <span style="font-size:15px;color:var(--muted)">${k.rv.toLocaleString('en-IN')}</span></td>
    <td><button class="btn btn-navy btn-sm" onclick="onboardFromDir('${DIR.set}','${esc(k.c).replace(/'/g,"\\'")}')">Onboard →</button></td>
  </tr>`;}).join('');
  window.__dirRows = rows; /* index lookup for MLC onboarding */
  $('#app').innerHTML = `${isGBA?gbaElectorateBanner():''}<div class="card">
    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;align-items:start">
      <div><h2>Leader Directory</h2><div class="sub">${rows.length} of ${data.length} ${isGBA?'wards · Greater Bengaluru Authority 2026 — new corporations, no incumbents. Reservation decides who can contest each ward.':`seats · ${isMLC?'current MLCs by category (indirect polls — no margin data)':`sitting ${DIR.set==='mp'?'MPs (2024)':'MLAs (2023)'} and their runners-up${DIR.sort==='c'?'':' · most winnable seats first'}`}.`}</div></div>
      <button class="btn btn-ghost btn-sm" style="color:var(--navy);border-color:var(--line)" onclick="renderHome()">← Console Home</button>
    </div>
    <div class="taddgrid" style="grid-template-columns:1fr 1fr 1fr 1fr;margin-bottom:18px">
      <div><label>House</label><select onchange="DIR.set=this.value;renderDirectory()">
        <option value="mla" ${DIR.set==='mla'?'selected':''}>Vidhan Sabha — 224 MLAs</option>
        <option value="mp" ${DIR.set==='mp'?'selected':''}>Lok Sabha — 28 MPs</option>
        <option value="mlc" ${DIR.set==='mlc'?'selected':''}>Legislative Council — 75 MLCs</option>
        <option value="gba" ${DIR.set==='gba'?'selected':''}>GBA 2026 — 369 wards</option></select></div>
      <div><label>Search</label><input value="${esc(DIR.q)}" placeholder="Constituency or leader name"
        oninput="DIR.q=this.value;clearTimeout(DIR.t);DIR.t=setTimeout(renderDirectory,300)"></div>
      <div><label>${isGBA?'Reservation':'Party'}</label><select onchange="DIR.party=this.value;renderDirectory()">
        <option value="">${isGBA?'All categories':'All parties'}</option>${parties.map(p=>`<option ${DIR.party===p?'selected':''}>${p}</option>`).join('')}</select></div>
      <div><label>Sort by</label><select ${(isMLC||isGBA)?'disabled':''} onchange="DIR.sort=this.value;renderDirectory()">
        ${isGBA?'<option>Corporation / ward no.</option>':isMLC?'<option>Category / name</option>':`<option value="m" ${DIR.sort==='m'?'selected':''}>Margin (marginal first)</option>
        <option value="c" ${DIR.sort==='c'?'selected':''}>Constituency name</option>`}</select></div>
    </div>
    <table class="btab"><thead><tr>${isGBA?'<th>Ward</th><th>Population</th><th>Reservation</th><th></th>'
      :'<th>Constituency</th><th>Winner</th><th>Runner-up</th><th></th>'}</tr></thead>
    <tbody>${body||'<tr><td colspan="4" style="color:var(--muted)">No matches.</td></tr>'}</tbody></table>
  </div>`;
  window.scrollTo(0,0);
}
function onboardFromDir(set,cname){
  if(set==='gba'){
    const k=window.__dirRows[+cname]; if(!k) return;
    const scst=k.pop?Math.round((k.sc+k.st)/k.pop*100):0;
    const ev=estWardVoters(k);
    W = {step:0, data:{services:[], electionType:'municipal', status:'Exploring / undecided',
      state:'Karnataka', constituency:`Ward ${k.no} — ${k.name}, Bengaluru ${k.corp} Corporation`,
      mix:'Mostly urban', voters:String(ev||k.pop),
      rivals:`GBA 2026 ward. Reservation: ${k.resv} — candidate must qualify. ${ev?'Est. ~'+ev.toLocaleString('en-IN')+' voters (2026, scaled from 2011 census)':'Population '+k.pop.toLocaleString('en-IN')} (SC+ST ${scst}%). ${k.corp} Corporation had ${(GBA_VOTERS.corps[k.corp].total/1e5).toFixed(1)}L voters at March-2026 rolls. Falls under ${k.ac} assembly seat (AC ${k.acno}). New corporation — no incumbent; ward-level influencers and ex-BBMP corporator networks are the real rivals.`}};
    renderWizard(); return;
  }
  if(set==='mlc'){
    const k=window.__dirRows[+cname]; if(!k) return;
    W = {step:0, data:{services:[], electionType:'mlc',
      name:k.w, party:k.wp, position:'Sitting MLC — '+k.cat, status:'Incumbent defending seat',
      state:'Karnataka', constituency:k.c+(k.cat!==k.c?' ('+k.cat+')':''),
      rivals:`Sitting MLC (${k.cat}), term ends ${k.te}. Electoral college seat — no direct-vote margin data.`}};
    renderWizard(); return;
  }
  const data = set==='mp'?window.KA_LS2024:window.KA2023;
  const k = data.find(x=>x.c===cname); if(!k) return;
  W = {step:0, data:{services:[], electionType:set==='mp'?'lok_sabha':'vidhan_sabha',
    name:k.w, party:k.wp, position:set==='mp'?'Sitting MP':'Sitting MLA', status:'Incumbent defending seat',
    state:'Karnataka', constituency:k.c, intel:k,
    rivals:`Sitting ${set==='mp'?'MP':'MLA'}: ${k.w} (${k.wp}), won ${set==='mp'?'2024':'2023'} by ${k.m.toLocaleString('en-IN')} votes over ${k.r} (${k.rp}).`}};
  renderWizard();
}

/* ---------- Cloud boot: login + live sync ---------- */
function renderLogin(msg){
  window.__rerender = ()=>renderLogin();
  $('#app').innerHTML = `
   <div class="card" style="max-width:520px;margin:0 auto;">
     <h2>Team Sign-In</h2>
     <div class="sub">RAAYA Console cloud is enabled. Sign in with an account created in Firebase Authentication.</div>
     <div class="fgrid" style="grid-template-columns:1fr;">
       <div><label>Email</label><input id="li_email" type="email" autocomplete="username"></div>
       <div><label>Password</label><input id="li_pass" type="password" autocomplete="current-password"
            onkeydown="if(event.key==='Enter')doLogin()"></div>
     </div>
     <div class="err" id="lierr" ${msg?'style="display:block"':''}>${esc(msg||'')}</div>
     <div class="wnav"><span></span><button class="btn btn-gold" onclick="doLogin()">Sign In</button></div>
   </div>`;
}
function doLogin(){
  firebase.auth().signInWithEmailAndPassword($('#li_email').value.trim(), $('#li_pass').value)
    .catch(e=>{ const el=$('#lierr'); el.textContent=e.message; el.style.display='block'; });
}
function doLogout(){ firebase.auth().signOut(); }

function boot(){
  if(!cloudConfigured()){ renderHome(); return; }   // local mode until keys are pasted
  firebase.initializeApp(window.FIREBASE_CONFIG);
  try{ firebase.firestore().enablePersistence({synchronizeTabs:true}).catch(()=>{}); }catch(e){}
  firebase.auth().onAuthStateChanged(async user=>{
    if(!user){ CLOUD=null; renderLogin(); return; }
    const fs=firebase.firestore();
    const col=fs.collection('leaders');
    let isAdmin=false;
    try{ isAdmin=(await fs.doc('admins/'+user.email).get()).exists; }catch(e){}
    CLOUD={col, cache:[], user, isAdmin};
    let first=true;
    /* staff only receive leaders they're granted on; admins receive all */
    const q = isAdmin ? col : col.where('access','array-contains',user.email);
    q.onSnapshot(snap=>{
      CLOUD.cache = snap.docs.map(d=>d.data());
      if(first){ first=false;
        const loc=localdb.all();   // one-time migration of existing browser data (admins only)
        if(isAdmin && loc.length && snap.empty){
          loc.forEach(r=>{ r.access=r.access||[user.email]; col.doc(r.id).set(r); });
          CLOUD.cache=loc.slice();
        }
        renderHome(); return;
      }
      (window.__rerender||renderHome)();
    }, e=>renderLogin('Cloud error: '+e.message));
  });
}
boot();
</script>
